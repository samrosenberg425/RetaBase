name: Update database and publish site

# Scheduled incremental update: fetch new PubMed records, rebuild the curated
# layer + site, and deploy the static dashboard to GitHub Pages. The (large)
# SQLite corpus is kept in the Actions cache (~10 GB free per repo) so the git
# repo stays small; only the compact site + curated exports are published.
#
# Two jobs (GitHub's canonical Pages pattern):
#   build  -> fetch + rebuild + upload the Pages artifact (serialized with the
#             other corpus workflows via the shared 'retarats-corpus' lock).
#   deploy -> deploy the artifact, in its OWN 'pages' concurrency group so
#             overlapping runs never collide at the deploy step (that collision
#             is what produced the transient "Deployment failed, try again later").

on:
  schedule:
    - cron: "0 6 * * *"     # daily 06:00 UTC — rebuild + republish from the growing corpus
  workflow_dispatch:         # allow manual runs

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Serialized with backfill/citations/registry so only one job writes the
    # shared corpus cache at a time (prevents cache-overwrite races).
    concurrency:
      group: retarats-corpus
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate config CSVs (fail fast on a malformed rule file)
        run: python3 scripts/validate_config.py

      # Restore the growing SQLite corpus from cache (survives between runs).
      - name: Restore corpus cache
        uses: actions/cache@v4
        with:
          path: data
          key: retarats-corpus-${{ github.run_id }}
          restore-keys: |
            retarats-corpus-

      - name: Incremental PubMed fetch (last 8 days)
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          API_CONTACT_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: |
          python3 retarats_v2.py --config-mode local --mode daily --daily-days 8 \
            --summary-mode rule_based --sinks local \
            --local-db data/retarats_pubmed.sqlite --state-db data/retarats_state.sqlite || true

      - name: Backfill citation counts (OpenAlex, impact axis)
        env:
          API_CONTACT_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: |
          python3 scripts/run_impact_backfill.py --db data/retarats_pubmed.sqlite --max-records 8000 || true

      - name: Rebuild curated layer + site
        run: |
          python3 scripts/build_curated_database.py --db data/retarats_pubmed.sqlite --out-dir exports/curated
          python3 scripts/build_public_site.py --curated-dir exports/curated --out-dir exports/site --mode fetch
          # DEPLOYMENT GATE: no `|| true` -- if the curated build fails validation
          # (bad/empty data, dup ids, out-of-range scores, human-evidence collapse),
          # this step fails, the build job fails, and the deploy job (needs: build)
          # is skipped -- so the last good site stays up instead of publishing a bad
          # build. Fetch/enrichment steps keep `|| true` (a source hiccup shouldn't
          # block a publish); only the final validation is a hard gate.
          python3 scripts/validate_curated.py --curated-dir exports/curated
          cp exports/curated/site_data.json exports/site/site_data.json
          # Rebuild + publish the registry feeds straight from the trials/preprints
          # SQLite DBs that registry.yml populates in the SHARED cache (exports/ is
          # ephemeral, so we can't rely on a file it wrote). Guarded so that if those
          # DBs don't exist yet (registry.yml hasn't run), the deploy still succeeds.
          python3 scripts/build_trials_json.py --db data/retarats_trials.sqlite --out exports/site/trials_data.json 2>/dev/null || true
          python3 scripts/build_preprints_json.py --db data/retarats_preprints.sqlite --out exports/site/preprints_data.json 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exports/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Dedicated Pages-deploy lock. cancel-in-progress: a newer deploy supersedes
    # an older in-flight one instead of both failing with "try again later"
    # (which happens when runs stack up and compete for the single Pages env).
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
