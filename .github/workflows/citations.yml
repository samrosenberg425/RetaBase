name: Backfill citations (lazy background)

# Dedicated, frequent, low-effort citation top-up for the hosted path. Runs a
# bounded batch every 6 hours against the corpus in the Actions cache, so
# citations fill in gradually without blocking the weekly fetch/deploy. Cheap and
# resumable: it only touches papers that still lack a citation count.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
    inputs:
      max_records:
        description: "How many missing-citation papers to fill this run (OpenAlex). Raise (e.g. 25000) for a big manual catch-up; scheduled runs use 6000."
        default: "6000"

permissions:
  contents: read

concurrency:
  # Shared with the fetch/backfill + update workflows: only ONE job may touch the
  # corpus cache at a time, so concurrent runs can't overwrite each other's writes.
  group: retarats-corpus
  cancel-in-progress: false

jobs:
  citations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Restore corpus cache
        uses: actions/cache@v4
        with:
          path: data
          key: retarats-corpus-${{ github.run_id }}
          restore-keys: |
            retarats-corpus-

      - name: Backfill a batch of citations (newest first)
        env:
          API_CONTACT_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: |
          python3 scripts/run_impact_backfill.py --db data/retarats_pubmed.sqlite \
            --newest-first --max-records ${{ github.event.inputs.max_records || '6000' }} || true
