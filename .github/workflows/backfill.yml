name: Historical backfill (auto)

# Large historical backfill that CONTINUES ITSELF on a schedule until done.
# Walks backwards from a start year, size-capped, resumable via
# data/backfill_checkpoint.json in the cache. GitHub jobs cap at ~6h, so each
# scheduled run does another ~6h chunk and the checkpoint resumes where the last
# stopped. Once it reaches target_gb (or min_year) later runs are quick no-ops.
# You can also trigger it manually with custom bounds.

on:
  schedule:
    - cron: "15 */6 * * *"   # every 6 h: auto-continue the fill until the target is reached
  workflow_dispatch:
    inputs:
      start_year:
        description: "Newest year to fetch (walk backwards from here)"
        default: "2025"
      min_year:
        description: "Oldest year to attempt (2000 = the priority target; lower it later for pre-2000)"
        default: "2000"
      target_gb:
        description: "Stop once the SQLite reaches this size (GB)"
        default: "8"
      max_years:
        description: "How many years to fetch in THIS run (bounds it under the 6h job limit)"
        default: "3"
      force:
        description: "Re-fetch years even if the checkpoint marks them done (use after changing search terms). Set to true for a corrective re-run."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Serialized with update + citations so corpus-cache writes never race.
  group: retarats-corpus
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Restore corpus cache
        uses: actions/cache@v4
        with:
          path: data
          key: retarats-corpus-${{ github.run_id }}
          restore-keys: |
            retarats-corpus-

      - name: Run backfill
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          API_CONTACT_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: |
          python3 scripts/run_backfill.py \
            --start-year ${{ github.event.inputs.start_year || '2025' }} \
            --min-year ${{ github.event.inputs.min_year || '2000' }} \
            --target-gb ${{ github.event.inputs.target_gb || '8' }} \
            --max-years ${{ github.event.inputs.max_years || '3' }} \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }} \
            --db data/retarats_pubmed.sqlite --state-db data/retarats_state.sqlite
